<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歡迎來到劉耀鍵的網站</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family:'Noto Sans TC',Arial,sans-serif;
  background:#fdf6e3;
  color:#3e3a36;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  max-width:600px;
  width:90%;
}

h1 {
  text-align:center;
  color:#a56a46;
  margin-bottom:30px;
}

.card {
  background:#fff8f0;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  text-align:center;
}

.card h2 {
  color:#b2734f;
  margin-bottom:10px;
}

.card p {
  margin-bottom:15px;
}

.btn {
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#a56a46;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  background:#d28c6d;
}

#langToggle {
  position:absolute;
  top:10px;
  right:10px;
  background:#a56a46;
  color:#fff;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<button id="langToggle">EN</button>

<div class="container">

  <h1 id="title">歡迎來到劉耀鍵的網站</h1>

  <div class="card">
    <h2 id="workTitle">💻 專業履歷</h2>
    <p id="workDesc">技能、專案、經歷</p>
    <button id="workBtn" class="btn" onclick="location.href='portfolio.html'">進入</button>
  </div>

  <div class="card">
    <h2 id="lifeTitle">🎸 生活興趣</h2>
    <p id="lifeDesc">音樂、旅行、攝影</p>
    <button id="lifeBtn" class="btn" onclick="location.href='life.html'">進入</button>
  </div>

  <div class="card">
    <h2 id="fortuneTitle">🍀 每日運氣</h2>
    <p id="fortuneDesc">抽一支籤看看今天運氣如何</p>
    <button id="fortuneBtn" class="btn" onclick="location.href='fortune.html'">開始抽籤</button>
  </div>

</div>

<script>
let isZh = true;

const title = document.getElementById("title");

const workTitle = document.getElementById("workTitle");
const workDesc = document.getElementById("workDesc");
const workBtn = document.getElementById("workBtn");

const lifeTitle = document.getElementById("lifeTitle");
const lifeDesc = document.getElementById("lifeDesc");
const lifeBtn = document.getElementById("lifeBtn");

const fortuneTitle = document.getElementById("fortuneTitle");
const fortuneDesc = document.getElementById("fortuneDesc");
const fortuneBtn = document.getElementById("fortuneBtn");

const langToggle = document.getElementById("langToggle");

langToggle.onclick = () => {

  if(isZh){

    title.textContent = "Welcome to Yao-Chien Liu's Website";

    workTitle.textContent = "💻 Professional Resume";
    workDesc.textContent = "Skills, Projects, Experience";
    workBtn.textContent = "Enter";

    lifeTitle.textContent = "🎸 Life & Hobbies";
    lifeDesc.textContent = "Music, Travel, Photography";
    lifeBtn.textContent = "Enter";

    fortuneTitle.textContent = "🍀 Daily Fortune";
    fortuneDesc.textContent = "Draw a fortune for today";
    fortuneBtn.textContent = "Start";

    langToggle.textContent = "中文";

  } else {

    title.textContent = "歡迎來到劉耀鍵的網站";

    workTitle.textContent = "💻 專業履歷";
    workDesc.textContent = "技能、專案、經歷";
    workBtn.textContent = "進入";

    lifeTitle.textContent = "🎸 生活興趣";
    lifeDesc.textContent = "音樂、旅行、攝影";
    lifeBtn.textContent = "進入";

    fortuneTitle.textContent = "🍀 每日運氣";
    fortuneDesc.textContent = "抽一支籤看看今天運氣如何";
    fortuneBtn.textContent = "開始抽籤";

    langToggle.textContent = "EN";
  }

  isZh = !isZh;
};
</script>

</body>
</html>
